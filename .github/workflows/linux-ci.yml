name: Linux CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Swift 6.3 on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Swift Docker Image
        run: docker pull swift:6.3

      - name: Show Swift Version
        run: |
          docker run --rm swift:6.3 swift --version

      - name: Resolve Dependencies
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            swift:6.3 \
            swift package resolve

      - name: Build
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            swift:6.3 \
            swift build

      - name: Test
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            swift:6.3 \
            swift test
